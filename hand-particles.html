<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>手势粒子交互</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
background: #0a0a0a;
overflow: hidden;
font-family: -apple-system, 'Segoe UI', sans-serif;
color: #fff;
}
#container {
position: relative;
width: 100vw;
height: 100vh;
}
video {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
object-fit: cover;
transform: scaleX(-1);
opacity: 0.2;
z-index: 0;
}
#particleCanvas {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: 1;
}
#debugCanvas {
position: absolute;
top: 0; left: 0;
width: 100%; height: 100%;
z-index: 2;
pointer-events: none;
}
#ui {
position: absolute;
top: 20px; left: 20px;
z-index: 10;
background: rgba(0,0,0,0.7);
backdrop-filter: blur(10px);
border: 1px solid rgba(255,255,255,0.15);
border-radius: 12px;
padding: 16px 20px;
min-width: 200px;
}
#ui h2 { font-size: 15px; margin-bottom: 12px; }
.status {
display: flex; align-items: center; gap: 8px;
margin-bottom: 6px; font-size: 12px; opacity: 0.8;
}
.dot {
width: 8px; height: 8px;
border-radius: 50%; background: #f44;
transition: background 0.3s;
}
.dot.on { background: #4f4; }
#gesture { font-size: 18px; margin-top: 8px; }
#hint {
position: absolute;
bottom: 24px; left: 50%; transform: translateX(-50%);
z-index: 10;
background: rgba(0,0,0,0.5);
border-radius: 20px; padding: 10px 24px;
font-size: 13px; opacity: 0.5;
}
#loading {
position: absolute;
top: 50%; left: 50%; transform: translate(-50%, -50%);
z-index: 100;
font-size: 16px;
background: rgba(0,0,0,0.8);
padding: 30px 40px;
border-radius: 12px;
text-align: center;
}
#loading .spinner {
width: 40px; height: 40px;
border: 3px solid rgba(255,255,255,0.2);
border-top-color: #7c5cfc;
border-radius: 50%;
animation: spin 0.8s linear infinite;
margin: 0 auto 16px;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div id="container">
<video id="video" autoplay playsinline muted></video>
<canvas id="particleCanvas"></canvas>
<canvas id="debugCanvas"></canvas>

<div id="ui">
<h2>✋ 手势粒子交互</h2>
<div class="status"><div class="dot" id="camDot"></div><span id="camText">摄像头...</span></div>
<div class="status"><div class="dot" id="handDot"></div><span id="handText">等待手部...</span></div>
<div id="gesture"></div>
</div>

<div id="hint">伸出手掌 | 捏合手指 | 握拳</div>

<div id="loading">
<div class="spinner"></div>
<div>正在加载手部识别模型...</div>
</div>
</div>

<script type="module">
// ============================================================
// 使用 MediaPipe Tasks Vision API（更可靠）
// ============================================================
import { HandLandmarker, FilesetResolver } from 'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/vision_bundle.mjs';

const video = document.getElementById('video');
const pCanvas = document.getElementById('particleCanvas');
const dCanvas = document.getElementById('debugCanvas');
const pCtx = pCanvas.getContext('2d');
const dCtx = dCanvas.getContext('2d');
const loading = document.getElementById('loading');
const camDot = document.getElementById('camDot');
const camText = document.getElementById('camText');
const handDot = document.getElementById('handDot');
const handText = document.getElementById('handText');
const gestureEl = document.getElementById('gesture');

function resize() {
pCanvas.width = dCanvas.width = window.innerWidth;
pCanvas.height = dCanvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// ============================================================
// 粒子系统
// ============================================================
const particles = [];
const PARTICLE_COUNT = 300;

class Particle {
constructor() { this.reset(); }
reset() {
this.x = Math.random() * pCanvas.width;
this.y = Math.random() * pCanvas.height;
this.vx = (Math.random() - 0.5) * 2;
this.vy = (Math.random() - 0.5) * 2;
this.life = 1;
this.decay = 0.003 + Math.random() * 0.005;
this.size = 2 + Math.random() * 4;
this.hue = Math.random() * 60 + 200;
this.trail = [];
}
update(handPts, gesture) {
this.life -= this.decay;
if (this.life <= 0) { this.reset(); return; }

this.vy += 0.03; // 微弱重力

if (handPts.length > 0) {
let minD = Infinity, closest = null;
for (const p of handPts) {
const d = Math.hypot(p.x - this.x, p.y - this.y);
if (d < minD) { minD = d; closest = p; }
}

const range = 200;
if (minD < range && closest) {
const f = (1 - minD / range);
const dx = closest.x - this.x;
const dy = closest.y - this.y;

if (gesture === 'fist') {
this.vx += dx * f * 0.04;
this.vy += dy * f * 0.04;
this.life = Math.min(this.life + 0.02, 1);
} else if (gesture === 'pinch') {
const a = Math.atan2(dy, dx) + 1.5;
this.vx += Math.cos(a) * f * 3;
this.vy += Math.sin(a) * f * 3;
} else {
this.vx -= dx * f * 0.025;
this.vy -= dy * f * 0.025;
}
}
}

this.vx *= 0.95;
this.vy *= 0.95;
this.x += this.vx;
this.y += this.vy;

if (this.x < 0) { this.x = 0; this.vx *= -0.7; }
if (this.x > pCanvas.width) { this.x = pCanvas.width; this.vx *= -0.7; }
if (this.y < 0) { this.y = 0; this.vy *= -0.7; }
if (this.y > pCanvas.height) { this.y = pCanvas.height; this.vy *= -0.7; }

this.trail.push({ x: this.x, y: this.y });
if (this.trail.length > 12) this.trail.shift();
}
draw(ctx) {
const a = this.life;
if (this.trail.length > 1) {
ctx.beginPath();
ctx.moveTo(this.trail[0].x, this.trail[0].y);
for (let i = 1; i < this.trail.length; i++) ctx.lineTo(this.trail[i].x, this.trail[i].y);
ctx.strokeStyle = `hsla(${this.hue}, 80%, 65%, ${a * 0.25})`;
ctx.lineWidth = this.size * 0.4;
ctx.stroke();
}
ctx.beginPath();
ctx.arc(this.x, this.y, this.size * a, 0, Math.PI * 2);
ctx.fillStyle = `hsla(${this.hue}, 80%, 65%, ${a})`;
ctx.fill();
}
}

for (let i = 0; i < PARTICLE_COUNT; i++) particles.push(new Particle());

// ============================================================
// 手势识别
// ============================================================
function getGesture(lm) {
const thumb = lm[4], index = lm[8], mid = lm[12], ring = lm[16], pinky = lm[20], palm = lm[9];
const d = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);
const pinch = d(thumb, index);
const avg = (d(index, palm) + d(mid, palm) + d(ring, palm) + d(pinky, palm)) / 4;
if (pinch < 0.06) return 'pinch';
if (avg < 0.13) return 'fist';
return 'palm';
}

// ============================================================
// 手部骨架绘制
// ============================================================
const CONNS = [[0,1],[1,2],[2,3],[3,4],[0,5],[5,6],[6,7],[7,8],[5,9],[9,10],[10,11],[11,12],[9,13],[13,14],[14,15],[15,16],[13,17],[17,18],[18,19],[19,20],[0,17]];

function drawHand(pts) {
dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
if (!pts.length) return;
const w = pCanvas.width, h = pCanvas.height;
const mapped = pts.map(p => ({ x: (1 - p.x) * w, y: p.y * h }));

dCtx.strokeStyle = 'rgba(100,180,255,0.5)';
dCtx.lineWidth = 2;
for (const [a, b] of CONNS) {
dCtx.beginPath();
dCtx.moveTo(mapped[a].x, mapped[a].y);
dCtx.lineTo(mapped[b].x, mapped[b].y);
dCtx.stroke();
}
for (let i = 0; i < mapped.length; i++) {
dCtx.beginPath();
dCtx.arc(mapped[i].x, mapped[i].y, i % 4 === 0 ? 6 : 3, 0, Math.PI * 2);
dCtx.fillStyle = i === 0 ? '#7c5cfc' : '#64b5f6';
dCtx.fill();
}
return mapped;
}

// ============================================================
// 主循环
// ============================================================
let handPts = [];
let gesture = 'none';
let handLandmarker = null;

async function init() {
try {
// 加载模型
const vision = await FilesetResolver.forVisionTasks(
'https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.18/wasm'
);
handLandmarker = await HandLandmarker.createFromOptions(vision, {
baseOptions: {
modelAssetPath: 'https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task',
delegate: 'GPU'
},
runningMode: 'VIDEO',
numHands: 1,
minHandDetectionConfidence: 0.5,
minHandPresenceConfidence: 0.5,
minTrackingConfidence: 0.5
});

loading.style.display = 'none';

// 启动摄像头
const stream = await navigator.mediaDevices.getUserMedia({
video: { facingMode: 'user', width: { ideal: 1280 }, height: { ideal: 720 } }
});
video.srcObject = stream;
await video.play();
camDot.classList.add('on');
camText.textContent = '摄像头已连接';

// 开始检测
let lastTime = -1;
function detect() {
requestAnimationFrame(detect);
if (!handLandmarker || video.readyState < 2) return;
const now = video.currentTime;
if (now === lastTime) return;
lastTime = now;

const result = handLandmarker.detectForVideo(video, performance.now());

if (result.landmarks && result.landmarks.length > 0) {
const lm = result.landmarks[0];
handPts = drawHand(lm);
gesture = getGesture(lm);
handDot.classList.add('on');
const names = { palm: '🖐 手掌 · 推开', fist: '✊ 握拳 · 聚集', pinch: '🤏 捏合 · 旋转' };
handText.textContent = names[gesture] || '检测中';
gestureEl.textContent = names[gesture] || '';
} else {
handPts = [];
gesture = 'none';
handDot.classList.remove('on');
handText.textContent = '未检测到手';
gestureEl.textContent = '';
dCtx.clearRect(0, 0, dCanvas.width, dCanvas.height);
}
}
detect();

// 粒子渲染
function animate() {
requestAnimationFrame(animate);
pCtx.fillStyle = 'rgba(10, 10, 10, 0.07)';
pCtx.fillRect(0, 0, pCanvas.width, pCanvas.height);
for (const p of particles) {
p.update(handPts, gesture);
p.draw(pCtx);
}
}
animate();

} catch (err) {
loading.innerHTML = `<div style="color:#f66">加载失败: ${err.message}</div><div style="margin-top:8px;font-size:12px;opacity:0.6">请检查网络连接后刷新</div>`;
console.error(err);
}
}

init();
</script>
</body>
</html>
