# 文匠 Studio — Nginx 公网最小配置
#
# 在 nginx.conf 的 http { } 内加入（只需一次）：
#   limit_req_zone $binary_remote_addr zone=studio_auth:10m rate=10r/m;
#
# 1. 替换 studio.example.com、证书路径
# 2. sudo ln -s .../nginx-literary-studio.conf /etc/nginx/sites-enabled/
# 3. sudo nginx -t && sudo systemctl reload nginx

upstream literary_studio {
    server 127.0.0.1:8765;
    keepalive 32;
}

# HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name studio.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name studio.example.com;

    ssl_certificate     /etc/letsencrypt/live/studio.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/studio.example.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    client_max_body_size 12m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    # 登录/注册限速（需先在 http {} 中声明 limit_req_zone studio_auth）
    location /api/auth/ {
        limit_req zone=studio_auth burst=5 nodelay;
        proxy_pass http://literary_studio;
        include /etc/nginx/proxy_params;
    }

    location /ws {
        proxy_pass http://literary_studio;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        # 不在 access log 中记录 query（WS 已改首帧认证，无 token 参数）
        access_log /var/log/nginx/studio-ws.log combined;
    }

    location / {
        proxy_pass http://literary_studio;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
